<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🥘 Mise en Place</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #fdf8f2; color: #2d1f0e; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #c8b89a; border-radius: 4px; }
    #header { background: #2d1f0e; padding: 20px 24px 0; position: sticky; top: 0; z-index: 10; }
    #header-inner { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    #logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: #f5ede0; letter-spacing: -0.5px; }
    #tagline { font-size: 12px; color: #a08060; margin-top: 2px; }
    #recipe-count { background: #c8a96e; color: #2d1f0e; font-weight: 600; font-size: 12px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    #nav { display: flex; gap: 4px; flex-wrap: wrap; }
    .nav-btn { background: transparent; border: none; color: #a08060; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; padding: 8px 11px; border-radius: 8px 8px 0 0; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .nav-btn:hover { background: #f5ede0; color: #2d1f0e; }
    .nav-btn.active { background: #fdf8f2; color: #2d1f0e; }
    #content { padding: 24px 16px; max-width: 700px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }
    .section-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .section-sub { font-size: 14px; color: #a08060; margin-bottom: 20px; }
    .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag { background: #f5ede0; color: #7a4f2a; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
    .empty { text-align: center; color: #a08060; padding: 40px; font-style: italic; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #7a4f2a; margin-bottom: 6px; margin-top: 14px; }
    .form-hint { font-weight: 400; color: #a08060; }
    .form-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid #e8ddd0; border-radius: 10px; background: #fdf8f2; color: #2d1f0e; resize: vertical; }
    .form-input:focus { outline: none; border-color: #c8a96e; }
    #pick-grid { display: grid; gap: 14px; }
    .pick-card { background: #fff; border: 1px solid #e8ddd0; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(45,31,14,0.06); cursor: pointer; transition: all 0.2s; }
    .pick-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,31,14,0.14); }
    .pick-card-name { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; margin-bottom: 10px; }
    .pick-card-count { font-size: 12px; color: #a08060; margin-top: 10px; }
    .pick-arrow { margin-top: 14px; font-size: 13px; font-weight: 600; color: #7a4f2a; }
    #checklist-wrap { max-width: 480px; margin: 0 auto; }
    #back-btn { background: none; border: none; color: #a08060; font-size: 13px; cursor: pointer; padding: 0 0 16px; font-family: 'DM Sans', sans-serif; }
    #checklist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    #checklist-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; }
    #checklist-progress { font-size: 13px; color: #a08060; font-weight: 600; }
    #progress-bar { height: 6px; background: #e8ddd0; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    #progress-fill { height: 100%; border-radius: 10px; background: #c8a96e; transition: width 0.3s ease, background 0.3s; width: 0%; }
    #all-done-banner { background: #eaf5ee; border: 1px solid #b2dfc0; color: #2e7d4f; border-radius: 12px; padding: 12px 16px; font-size: 14px; font-weight: 600; margin-bottom: 16px; text-align: center; display: none; }
    #checklist-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 24px; }
    .check-row { display: flex; align-items: center; gap: 14px; padding: 12px 10px; cursor: pointer; border-radius: 12px; transition: background 0.15s; user-select: none; }
    .check-row:hover { background: #f5ede0; }
    .checkbox { width: 24px; height: 24px; border-radius: 8px; border: 2px solid #d0c0a8; background: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .checkbox.checked { background: #2d1f0e; border-color: #2d1f0e; }
    .checkmark { color: #f5ede0; font-size: 13px; font-weight: 700; display: none; }
    .checkbox.checked .checkmark { display: block; }
    .ing-label { font-size: 15px; transition: all 0.15s; }
    .ing-label.checked { text-decoration: line-through; color: #a08060; }
    #reset-btn { background: none; border: 1px solid #e8ddd0; border-radius: 10px; padding: 9px 18px; font-size: 13px; color: #a08060; cursor: pointer; font-family: 'DM Sans', sans-serif; width: 100%; transition: background 0.15s; }
    #reset-btn:hover { background: #f5ede0; }
    #rec-filters { background: #fff; border: 1px solid #e8ddd0; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
    #rec-filters .form-label { margin-top: 0; }
    #rec-mood { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid #e8ddd0; border-radius: 10px; background: #fdf8f2; color: #2d1f0e; }
    #rec-mood:focus { outline: none; border-color: #c8a96e; }
    #rec-ings { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border: 1px solid #e8ddd0; border-radius: 10px; background: #fdf8f2; color: #2d1f0e; margin-top: 0; resize: none; }
    #rec-ings:focus { outline: none; border-color: #c8a96e; }
    .tag-filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .tag-filter { background: #f5ede0; color: #7a4f2a; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; user-select: none; text-transform: uppercase; letter-spacing: 0.4px; }
    .tag-filter.selected { background: #2d1f0e; color: #f5ede0; border-color: #2d1f0e; }
    #rec-btn { margin-top: 18px; width: 100%; background: #2d1f0e; color: #f5ede0; border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
    #rec-btn:hover { background: #7a4f2a; }
    #rec-results { display: grid; gap: 14px; }
    .rec-card { background: #fff; border: 1px solid #e8ddd0; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(45,31,14,0.06); }
    .rec-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .rec-card-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
    .rec-score { font-size: 12px; font-weight: 600; color: #fff; background: #c8a96e; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .rec-score.high { background: #5a9e6f; }
    .rec-reason { font-size: 13px; color: #7a4f2a; margin-bottom: 12px; font-style: italic; }
    .rec-cook-btn { width: 100%; background: #f5ede0; color: #2d1f0e; border: none; border-radius: 10px; padding: 9px; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
    .rec-cook-btn:hover { background: #e8ddd0; }
    #rec-empty { display: none; text-align: center; color: #a08060; padding: 30px; font-style: italic; }
    #recipe-grid { display: grid; gap: 16px; }
    .recipe-card { background: #fff; border: 1px solid #e8ddd0; border-radius: 16px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(45,31,14,0.06); transition: box-shadow 0.2s; }
    .recipe-card:hover { box-shadow: 0 4px 20px rgba(45,31,14,0.12); }
    .recipe-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .recipe-name { font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600; }
    .card-btns { display: flex; gap: 6px; }
    .edit-btn, .delete-btn { background: none; border: none; color: #c8b89a; cursor: pointer; font-size: 16px; padding: 2px; transition: color 0.15s; }
    .edit-btn:hover { color: #7a4f2a; }
    .delete-btn:hover { color: #c0392b; }
    .ingredient-label { font-size: 11px; font-weight: 600; color: #a08060; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .ingredient-list { display: flex; flex-wrap: wrap; gap: 4px 16px; }
    .ingredient-item { font-size: 13px; color: #5a3e28; }
    .edit-form { display: flex; flex-direction: column; gap: 0; }
    .edit-actions { display: flex; gap: 8px; margin-top: 16px; }
    .save-btn { flex: 1; background: #2d1f0e; color: #f5ede0; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
    .save-btn:hover { background: #7a4f2a; }
    .cancel-btn { flex: 1; background: #f5ede0; color: #2d1f0e; border: none; border-radius: 10px; padding: 10px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
    .cancel-btn:hover { background: #e8ddd0; }
    #add-wrap { display: flex; justify-content: center; }
    #add-card { background: #fff; border: 1px solid #e8ddd0; border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(45,31,14,0.08); }
    #add-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; margin-bottom: 22px; }
    #submit-btn { margin-top: 24px; width: 100%; background: #2d1f0e; color: #f5ede0; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; }
    #submit-btn:hover { background: #7a4f2a; }
    #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2d1f0e; color: #f5ede0; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; }
    .loading { text-align: center; color: #a08060; padding: 40px; font-style: italic; }
    @media (max-width: 480px) {
      #content { padding: 16px 12px; }
      .nav-btn { font-size: 11px; padding: 7px 9px; }
    }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div>
      <div id="logo">🥘 Mise en Place</div>
      <div id="tagline">Your personal cooking companion</div>
    </div>
    <div id="recipe-count">...</div>
  </div>
  <div id="nav">
    <button class="nav-btn active" onclick="showView('pick')">🍽 Cook Today</button>
    <button class="nav-btn" onclick="showView('recommend')">✨ Recommend</button>
    <button class="nav-btn" onclick="showView('recipes')">📋 My Recipes</button>
    <button class="nav-btn" onclick="showView('add')">+ Add</button>
  </div>
</div>

<div id="content">
  <div id="view-pick" class="view active"><div class="loading">Loading recipes…</div></div>
  <div id="view-checklist" class="view">
    <div id="checklist-wrap">
      <button id="back-btn" onclick="showView('pick')">← Back</button>
      <div id="checklist-header">
        <div id="checklist-title"></div>
        <div id="checklist-progress"></div>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="all-done-banner">🎉 You've got everything! Time to cook.</div>
      <div id="checklist-list"></div>
      <button id="reset-btn" onclick="resetChecklist()">Reset checklist</button>
    </div>
  </div>
  <div id="view-recommend" class="view">
    <div class="section-title">What should I cook?</div>
    <div class="section-sub">Tell me what you're after and I'll find the best matches.</div>
    <div id="rec-filters">
      <label class="form-label">🧠 Mood or craving <span class="form-hint">(optional)</span></label>
      <input id="rec-mood" type="text" placeholder="e.g. something light, comfort food, quick lunch…" />
      <label class="form-label" style="margin-top:14px">🥦 Ingredients I have <span class="form-hint">(comma-separated, optional)</span></label>
      <textarea id="rec-ings" rows="2" class="form-input" placeholder="e.g. eggs, banana, garlic…"></textarea>
      <label class="form-label" style="margin-top:14px">🏷 Filter by tag <span class="form-hint">(tap to select)</span></label>
      <div class="tag-filter-row" id="tag-filters"></div>
      <button id="rec-btn" onclick="runRecommend()">Find Recipes</button>
    </div>
    <div id="rec-empty">No matches found. Try different filters or add more recipes!</div>
    <div id="rec-results"></div>
  </div>
  <div id="view-recipes" class="view"><div class="loading">Loading…</div></div>
  <div id="view-add" class="view">
    <div id="add-wrap">
      <div id="add-card">
        <div id="add-title">Add a New Recipe</div>
        <label class="form-label">Recipe Name</label>
        <input class="form-input" id="add-name" placeholder="e.g. Lemon Pasta" />
        <label class="form-label">Ingredients <span class="form-hint">(comma-separated)</span></label>
        <textarea class="form-input" id="add-ingredients" rows="3" placeholder="e.g. pasta, lemon, garlic, olive oil, parmesan"></textarea>
        <label class="form-label">Tags <span class="form-hint">(optional, comma-separated)</span></label>
        <input class="form-input" id="add-tags" placeholder="e.g. dinner, quick, vegetarian" />
        <button id="submit-btn" onclick="addRecipe()">Save Recipe</button>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://vpmkbtftelqespuhaejv.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_6fHpOOLWHPKeMhtcfriplQ_uMSYIwj0';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let recipes = [];
  let selectedRecipe = null;
  let checkedItems = {};
  let editingId = null;
  let selectedTags = new Set();

  const MOOD_MAP = {
    quick: ['quick','fast','easy'], light: ['light','salad','healthy'],
    protein: ['high-protein','protein'], breakfast: ['breakfast','morning','brunch'],
    dinner: ['dinner','supper','evening'], snack: ['snack','bite'],
    comfort: ['comfort','hearty','cozy','warm'], sweet: ['sweet','dessert','chocolate','honey'],
    vegetarian: ['vegetarian','vegan','veggie'], spicy: ['spicy','chili','hot'],
  };

  // ── Supabase helpers ───────────────────────────────────
  async function loadRecipes() {
    const { data, error } = await sb.from('Recipes').select('*').order('id');
    if (error) { showToast('Error loading recipes'); return; }
    recipes = data.map(r => ({
      id: r.id,
      name: r.Name,
      ingredients: r.Ingredients ? r.Ingredients.split('|') : [],
      tags: r.Tag ? r.Tag.split('|') : [],
    }));
    updateCount();
  }

  async function insertRecipe(name, ingredients, tags) {
    const { data, error } = await sb.from('Recipes').insert([{
      Name: name,
      Ingredients: ingredients.join('|'),
      Tag: tags.join('|'),
    }]).select().single();
    if (error) { showToast('Error saving recipe'); return null; }
    return { id: data.id, name, ingredients, tags };
  }

  async function updateRecipe(id, name, ingredients, tags) {
    const { error } = await sb.from('Recipes').update({
      Name: name,
      Ingredients: ingredients.join('|'),
      Tag: tags.join('|'),
    }).eq('id', id);
    if (error) { showToast('Error updating recipe'); return false; }
    return true;
  }

  async function removeRecipe(id) {
    const { error } = await sb.from('Recipes').delete().eq('id', id);
    if (error) { showToast('Error deleting recipe'); return false; }
    return true;
  }

  // ── Toast ──────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Navigation ─────────────────────────────────────────
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    const views = ['pick','recommend','recipes','add'];
    document.querySelectorAll('.nav-btn').forEach((btn, i) => {
      btn.classList.toggle('active', views[i] === name || (name === 'checklist' && views[i] === 'pick'));
    });
    if (name === 'pick') renderPick();
    if (name === 'recipes') renderRecipes();
    if (name === 'recommend') renderTagFilters();
    editingId = null;
  }

  function updateCount() {
    document.getElementById('recipe-count').textContent = recipes.length + ' recipe' + (recipes.length !== 1 ? 's' : '');
  }

  // ── Pick ───────────────────────────────────────────────
  function renderPick() {
    const grid = document.getElementById('view-pick');
    if (recipes.length === 0) {
      grid.innerHTML = '<div class="section-title">What are you cooking today?</div><div class="section-sub">Pick a recipe to get your ingredient checklist.</div><div class="empty">No recipes yet — add some first!</div>';
      return;
    }
    grid.innerHTML = '<div class="section-title">What are you cooking today?</div><div class="section-sub">Pick a recipe to get your ingredient checklist.</div><div id="pick-grid">' +
      recipes.map(r => `
        <div class="pick-card" onclick="openChecklist(${r.id})">
          <div class="pick-card-name">${esc(r.name)}</div>
          ${r.tags.length ? `<div class="tag-row">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
          <div class="pick-card-count">${r.ingredients.length} ingredient${r.ingredients.length!==1?'s':''}</div>
          <div class="pick-arrow">Get checklist →</div>
        </div>`).join('') + '</div>';
  }

  // ── Checklist ──────────────────────────────────────────
  function openChecklist(id) {
    selectedRecipe = recipes.find(r => r.id === id);
    checkedItems = {};
    renderChecklist();
    showView('checklist');
  }

  function renderChecklist() {
    if (!selectedRecipe) return;
    document.getElementById('checklist-title').textContent = selectedRecipe.name;
    const total = selectedRecipe.ingredients.length;
    const got = selectedRecipe.ingredients.filter(i => checkedItems[i]).length;
    document.getElementById('checklist-progress').textContent = got + ' / ' + total + ' got';
    document.getElementById('progress-fill').style.width = (got / total * 100) + '%';
    document.getElementById('progress-fill').style.background = got === total ? '#5a9e6f' : '#c8a96e';
    document.getElementById('all-done-banner').style.display = got === total ? 'block' : 'none';
    document.getElementById('checklist-list').innerHTML = selectedRecipe.ingredients.map(ing => `
      <div class="check-row" onclick="toggleItem('${esc(ing)}')">
        <div class="checkbox ${checkedItems[ing]?'checked':''}"><span class="checkmark">✓</span></div>
        <span class="ing-label ${checkedItems[ing]?'checked':''}">${esc(ing)}</span>
      </div>`).join('');
  }

  function toggleItem(ing) { checkedItems[ing] = !checkedItems[ing]; renderChecklist(); }
  function resetChecklist() { checkedItems = {}; renderChecklist(); }

  // ── Recommend ──────────────────────────────────────────
  function allTags() {
    const s = new Set();
    recipes.forEach(r => r.tags.forEach(t => s.add(t)));
    return [...s].sort();
  }

  function renderTagFilters() {
    const row = document.getElementById('tag-filters');
    const tags = allTags();
    if (tags.length === 0) { row.innerHTML = '<span style="color:#a08060;font-size:13px">No tags yet.</span>'; return; }
    row.innerHTML = tags.map(t => `<span class="tag-filter ${selectedTags.has(t)?'selected':''}" onclick="toggleTag('${esc(t)}')">${esc(t)}</span>`).join('');
  }

  function toggleTag(t) {
    selectedTags.has(t) ? selectedTags.delete(t) : selectedTags.add(t);
    renderTagFilters();
  }

  function scoreRecipe(r, moodWords, haveIngs, requiredTags) {
    let score = 0; const reasons = [];
    if (requiredTags.length > 0) {
      const rTagsLow = r.tags.map(t => t.toLowerCase());
      const matched = requiredTags.filter(t => rTagsLow.includes(t.toLowerCase()));
      if (matched.length === 0) return null;
      score += matched.length * 10;
      reasons.push(`tagged ${matched.join(', ')}`);
    }
    if (haveIngs.length > 0) {
      const rIngsLow = r.ingredients.map(i => i.toLowerCase());
      const matched = haveIngs.filter(i => rIngsLow.some(ri => ri.includes(i) || i.includes(ri)));
      if (matched.length > 0) {
        score += matched.length * 5;
        const pct = Math.round(matched.length / r.ingredients.length * 100);
        reasons.push(`you have ${matched.length} of ${r.ingredients.length} ingredients (${pct}%)`);
      }
    }
    if (moodWords.length > 0) {
      const rText = (r.name + ' ' + r.tags.join(' ') + ' ' + r.ingredients.join(' ')).toLowerCase();
      let moodHits = 0;
      for (const word of moodWords) {
        if (rText.includes(word)) { moodHits++; continue; }
        for (const [, synonyms] of Object.entries(MOOD_MAP)) {
          if (synonyms.includes(word) && synonyms.some(s => rText.includes(s))) { moodHits++; break; }
        }
      }
      if (moodHits > 0) { score += moodHits * 4; reasons.push('matches your craving'); }
    }
    if (moodWords.length === 0 && haveIngs.length === 0 && requiredTags.length === 0) score = 1;
    return score > 0 ? { recipe: r, score, reasons } : null;
  }

  function runRecommend() {
    const mood = document.getElementById('rec-mood').value.trim().toLowerCase();
    const ingsRaw = document.getElementById('rec-ings').value.trim().toLowerCase();
    const moodWords = mood ? mood.split(/[\s,]+/).filter(Boolean) : [];
    const haveIngs = ingsRaw ? ingsRaw.split(',').map(s => s.trim()).filter(Boolean) : [];
    const requiredTags = [...selectedTags];
    const scored = recipes.map(r => scoreRecipe(r, moodWords, haveIngs, requiredTags)).filter(Boolean);
    scored.sort((a, b) => b.score - a.score);
    const resultsEl = document.getElementById('rec-results');
    const emptyEl = document.getElementById('rec-empty');
    if (scored.length === 0) { resultsEl.innerHTML = ''; emptyEl.style.display = 'block'; return; }
    emptyEl.style.display = 'none';
    const maxScore = scored[0].score;
    resultsEl.innerHTML = scored.map(({ recipe: r, score, reasons }) => {
      const pct = Math.round(score / maxScore * 100);
      const isHigh = pct >= 70;
      const label = pct >= 80 ? '⭐ Great match' : pct >= 50 ? 'Good match' : 'Possible match';
      return `<div class="rec-card">
        <div class="rec-card-top"><div class="rec-card-name">${esc(r.name)}</div><span class="rec-score ${isHigh?'high':''}">${label}</span></div>
        ${r.tags.length ? `<div class="tag-row">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
        ${reasons.length ? `<div class="rec-reason">✓ ${reasons.join(' · ')}</div>` : ''}
        <button class="rec-cook-btn" onclick="openChecklist(${r.id})">Cook this → get checklist</button>
      </div>`;
    }).join('');
  }

  // ── Recipes ────────────────────────────────────────────
  function renderRecipes() {
    updateCount();
    const grid = document.getElementById('view-recipes');
    if (recipes.length === 0) { grid.innerHTML = '<div class="empty">No recipes yet. Add some!</div>'; return; }
    grid.innerHTML = '<div id="recipe-grid">' + recipes.map(r => {
      if (editingId === r.id) return `
        <div class="recipe-card">
          <div class="ingredient-label">Editing Recipe</div>
          <div class="edit-form">
            <label class="form-label">Name</label>
            <input class="form-input" id="edit-name-${r.id}" value="${esc(r.name)}" />
            <label class="form-label">Ingredients <span class="form-hint">(comma-separated)</span></label>
            <textarea class="form-input" id="edit-ings-${r.id}" rows="3">${esc(r.ingredients.join(', '))}</textarea>
            <label class="form-label">Tags <span class="form-hint">(comma-separated)</span></label>
            <input class="form-input" id="edit-tags-${r.id}" value="${esc(r.tags.join(', '))}" />
            <div class="edit-actions">
              <button class="save-btn" onclick="saveEdit(${r.id})">Save</button>
              <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
            </div>
          </div>
        </div>`;
      return `
        <div class="recipe-card">
          <div class="recipe-header">
            <div class="recipe-name">${esc(r.name)}</div>
            <div class="card-btns">
              <button class="edit-btn" onclick="startEdit(${r.id})">✎</button>
              <button class="delete-btn" onclick="deleteRecipe(${r.id})">✕</button>
            </div>
          </div>
          ${r.tags.length ? `<div class="tag-row">${r.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
          <div class="ingredient-label">Ingredients</div>
          <div class="ingredient-list">${r.ingredients.map(i=>`<span class="ingredient-item">• ${esc(i)}</span>`).join('')}</div>
        </div>`;
    }).join('') + '</div>';
  }

  function startEdit(id) { editingId = id; renderRecipes(); }
  function cancelEdit() { editingId = null; renderRecipes(); }

  async function saveEdit(id) {
    const name = document.getElementById('edit-name-' + id).value.trim();
    const ings = document.getElementById('edit-ings-' + id).value.split(',').map(s => s.trim()).filter(Boolean);
    const tags = document.getElementById('edit-tags-' + id).value.split(',').map(s => s.trim()).filter(Boolean);
    if (!name) return;
    const ok = await updateRecipe(id, name, ings, tags);
    if (ok) {
      recipes = recipes.map(r => r.id === id ? { ...r, name, ingredients: ings, tags } : r);
      showToast('Recipe updated!');
    }
    editingId = null; renderRecipes();
  }

  async function deleteRecipe(id) {
    if (!confirm('Delete this recipe?')) return;
    const ok = await removeRecipe(id);
    if (ok) {
      recipes = recipes.filter(r => r.id !== id);
      showToast('Recipe deleted');
      renderRecipes();
    }
  }

  // ── Add ────────────────────────────────────────────────
  async function addRecipe() {
    const name = document.getElementById('add-name').value.trim();
    const ings = document.getElementById('add-ingredients').value.split(',').map(s => s.trim()).filter(Boolean);
    const tags = document.getElementById('add-tags').value.split(',').map(s => s.trim()).filter(Boolean);
    if (!name || ings.length === 0) { alert('Please enter a name and at least one ingredient.'); return; }
    document.getElementById('submit-btn').textContent = 'Saving…';
    const newR = await insertRecipe(name, ings, tags);
    if (newR) {
      recipes.push(newR);
      showToast('Recipe saved!');
      document.getElementById('add-name').value = '';
      document.getElementById('add-ingredients').value = '';
      document.getElementById('add-tags').value = '';
      updateCount();
      showView('recipes');
    }
    document.getElementById('submit-btn').textContent = 'Save Recipe';
  }

  // ── Utils ──────────────────────────────────────────────
  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Init ───────────────────────────────────────────────
  loadRecipes().then(() => renderPick());
</script>
</body>
</html>
